<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 채팅방</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .chat-container { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 450px; height: 650px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { margin: 0; font-size: 18px; }
        .header-buttons button { background: rgba(255,255,255,0.2); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-left: 5px; }
        .header-buttons button:hover { background: rgba(255,255,255,0.4); }
        .admin-panel { background: #ffeeba; padding: 10px; display: none; justify-content: space-around; border-bottom: 1px solid #ffdf7e; }
        .admin-panel button { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; background: #e9ecef; display: flex; flex-direction: column; gap: 15px; }
        .message-wrap { display: flex; flex-direction: column; max-width: 70%; position: relative; }
        .message-wrap.me { align-self: flex-end; align-items: flex-end; }
        .message-wrap.other { align-self: flex-start; align-items: flex-start; }
        .sender-name { font-size: 12px; color: #555; margin-bottom: 3px; }
        .message-bubble { padding: 10px 15px; border-radius: 15px; font-size: 14px; word-wrap: break-word; position: relative; }
        .me .message-bubble { background: #007bff; color: white; border-top-right-radius: 2px; }
        .other .message-bubble { background: white; color: #333; border-top-left-radius: 2px; border: 1px solid #ddd; }
        .message-bubble img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .delete-msg-btn { background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; cursor: pointer; position: absolute; top: -10px; right: -10px; display: none; }
        .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; }
        .file-btn { background: #f8f9fa; border: 1px solid #ccc; padding: 0 15px; border-radius: 5px; cursor: pointer; margin-right: 10px; font-size: 20px; }
        .text-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        .send-btn { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-container">
    <header class="chat-header">
        <h2 id="room-title">채팅방</h2>
        <div class="header-buttons">
            <button id="admin-btn" style="display: none;" onclick="toggleAdminPanel()">👑 방장 메뉴</button>
            <button onclick="leaveRoom()">나가기</button>
        </div>
    </header>

    <div id="admin-panel" class="admin-panel">
        <button onclick="alert('밴 기능은 추후 구현예정입니다.')">유저 밴(Ban)</button>
        <button onclick="alert('뮤트 기능은 추후 구현예정입니다.')">유저 뮤트(Mute)</button>
        <button onclick="alert('방 삭제 기능은 추후 구현예정입니다.')">폭파(방 삭제)</button>
    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="sendImage(event)">
        <button class="file-btn" onclick="document.getElementById('image-upload').click()">📷</button>
        <input type="text" id="message-input" class="text-input" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">전송</button>
    </div>
</div>

<script type="module">
    import { db } from './firebase-init.js';
    import { collection, addDoc, onSnapshot, query, where, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const currentUser = localStorage.getItem('currentUser');
    const currentRoom = localStorage.getItem('currentRoom');
    const roomAdmin = localStorage.getItem('roomAdmin');
    let isAdmin = (currentUser === roomAdmin);

    if (!currentUser || !currentRoom) {
        window.location.href = 'dashboard.html';
    }

    document.getElementById('room-title').innerText = isAdmin ? `👑 ${currentRoom}` : currentRoom;
    if (isAdmin) document.getElementById('admin-btn').style.display = 'inline-block';

    // 1. 실시간 메시지 불러오기 (onSnapshot)
    const chatBox = document.getElementById('chat-box');
    const q = query(collection(db, "messages"), where("room", "==", currentRoom), orderBy("createdAt", "asc"));
    
    onSnapshot(q, (snapshot) => {
        chatBox.innerHTML = ''; // 화면 지우고 새로 그리기
        snapshot.forEach((docSnap) => {
            const msg = docSnap.data();
            const msgId = docSnap.id;
            const isMe = (msg.sender === currentUser);
            
            const wrap = document.createElement('div');
            wrap.className = `message-wrap ${isMe ? 'me' : 'other'}`;

            let contentHTML = msg.type === 'image' 
                ? `<img src="${msg.text}" alt="이미지">` 
                : msg.text;

            // 방장 전용 삭제 버튼 (데이터베이스 ID 연결)
            let deleteBtn = isAdmin ? `<button class="delete-msg-btn" onclick="deleteMessage('${msgId}')">X</button>` : '';

            wrap.innerHTML = `
                <div class="sender-name">${msg.sender}</div>
                <div class="message-bubble">${contentHTML} ${deleteBtn}</div>
            `;
            chatBox.appendChild(wrap);
        });
        chatBox.scrollTop = chatBox.scrollHeight; // 맨 아래로 스크롤
    });

    // 2. 메시지 전송 (DB에 저장)
    window.sendMessage = async function() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;

        try {
            await addDoc(collection(db, "messages"), {
                room: currentRoom,
                sender: currentUser,
                text: text,
                type: 'text',
                createdAt: serverTimestamp()
            });
            input.value = '';
        } catch (e) { console.error("메시지 전송 실패:", e); }
    };

    window.handleKeyPress = function(event) {
        if (event.key === 'Enter') window.sendMessage();
    };

    // 3. 이미지 전송 (Firestore에 Base64 형태로 임시 저장)
    window.sendImage = async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                await addDoc(collection(db, "messages"), {
                    room: currentRoom,
                    sender: currentUser,
                    text: e.target.result, // 이미지를 텍스트(Base64)로 변환해서 저장
                    type: 'image',
                    createdAt: serverTimestamp()
                });
            } catch (error) { console.error("이미지 업로드 실패:", error); }
        };
        reader.readAsDataURL(file);
    };

    // 4. 방장 관리 메뉴 토글
    window.toggleAdminPanel = function() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        document.querySelectorAll('.delete-msg-btn').forEach(btn => {
            btn.style.display = (panel.style.display === 'flex') ? 'block' : 'none';
        });
    };

    // 5. 방장 권한 - 메시지 삭제 (DB에서 실제로 삭제)
    window.deleteMessage = async function(msgId) {
        if(confirm("이 메시지를 강제로 삭제하시겠습니까?")) {
            await deleteDoc(doc(db, "messages", msgId));
        }
    };

    // 6. 나가기
    window.leaveRoom = function() {
        localStorage.removeItem('currentRoom');
        localStorage.removeItem('roomAdmin');
        window.location.href = 'dashboard.html';
    };
</script>

</body>
</html>
